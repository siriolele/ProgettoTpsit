<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Registrazione Nuovo Utente</h3>
        </div>
        <div class="card-body">
          <form #registrazioneForm="ngForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="nome" class="form-label">Nome Completo *</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="nome" 
                  name="nome"
                  [(ngModel)]="utente.nome"
                  required
                  #nome="ngModel"
                  placeholder="Inserisci il tuo nome">
                <div *ngIf="nome.invalid && nome.touched" class="text-danger small mt-1">
                  Nome obbligatorio
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email *</label>
                <input 
                  type="email" 
                  class="form-control" 
                  id="email" 
                  name="email"
                  [(ngModel)]="utente.email"
                  required
                  email
                  #email="ngModel"
                  placeholder="Inserisci la tua email">
                <div *ngIf="email.invalid && email.touched" class="text-danger small mt-1">
                  <span *ngIf="email.errors?.['required']">Email obbligatoria</span>
                  <span *ngIf="email.errors?.['email']">Formato email non valido</span>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="password" class="form-label">Password *</label>
                <input 
                  type="password" 
                  class="form-control" 
                  id="password" 
                  name="password"
                  [(ngModel)]="utente.password"
                  required
                  minlength="6"
                  #password="ngModel"
                  placeholder="Minimo 6 caratteri">
                <div *ngIf="password.invalid && password.touched" class="text-danger small mt-1">
                  <span *ngIf="password.errors?.['required']">Password obbligatoria</span>
                  <span *ngIf="password.errors?.['minlength']">Minimo 6 caratteri</span>
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <label for="confermaPassword" class="form-label">Conferma Password *</label>
                <input 
                  type="password" 
                  class="form-control" 
                  id="confermaPassword" 
                  name="confermaPassword"
                  [(ngModel)]="confermaPassword"
                  required
                  #conferma="ngModel">
                <div *ngIf="password.invalid && conferma.touched" class="text-danger small mt-1">
                  Le password non coincidono
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="codiceFiscale" class="form-label">Codice Fiscale *</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="codiceFiscale" 
                  name="codiceFiscale"
                  [(ngModel)]="utente.codiceFiscale"
                  required
                  #codiceFiscale="ngModel"
                  placeholder="Inserisci il codice fiscale"
                  uppercase>
                <div *ngIf="codiceFiscale.invalid && codiceFiscale.touched" class="text-danger small mt-1">
                  Codice Fiscale obbligatorio
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <label for="telefono" class="form-label">Telefono *</label>
                <input 
                  type="tel" 
                  class="form-control" 
                  id="telefono" 
                  name="telefono"
                  [(ngModel)]="utente.telefono"
                  required
                  #telefono="ngModel"
                  placeholder="Inserisci il tuo telefono">
                <div *ngIf="telefono.invalid && telefono.touched" class="text-danger small mt-1">
                  Telefono obbligatorio
                </div>
              </div>
            </div>

            <hr class="my-4">

            <div class="d-grid gap-2">
              <button 
                type="submit" 
                class="btn btn-primary btn-lg"
                [disabled]="registrazioneForm.invalid">
                Registrati
              </button>
            </div>
          </form>

          <p class="text-center mt-3">
            Hai già un account? <a routerLink="/accesso">Accedi</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
